<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just Pick Linux Already</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --rosewater: #f5e0dc; --flamingo: #f2cdcd; --pink: #f5c2e7;
    --mauve: #cba6f7; --red: #f38ba8; --maroon: #eba0ac;
    --peach: #fab387; --yellow: #f9e2af; --green: #a6e3a1;
    --teal: #94e2d5; --sky: #89dceb; --sapphire: #74c7ec;
    --blue: #89b4fa; --lavender: #b4befe; --text: #cdd6f4;
    --subtext1: #bac2de; --subtext0: #a6adc8; --overlay2: #9399b2;
    --overlay1: #7f849c; --overlay0: #6c7086; --surface2: #585b70;
    --surface1: #45475a; --surface0: #313244; --base: #1e1e2e;
    --mantle: #181825; --crust: #11111b;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--base);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem 4rem;
    overflow-x: hidden;
  }

  .bg-glow {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(203,166,247,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 50% 35% at 80% 90%, rgba(137,180,250,0.06) 0%, transparent 70%);
  }

  .grain {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
  }

  .wrap {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center;
    width: 100%; max-width: 680px;
  }

  /* ── HEADER ── */
  .header {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 2.6rem;
    opacity: 0;
    animation: fadeUp 0.6s 0.1s forwards;
    transition: margin-bottom 0.5s cubic-bezier(0.16,1,0.3,1);
  }

  .eyebrow {
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--mauve);
    margin-bottom: 0.6rem;
    overflow: hidden;
    max-height: 2rem;
    opacity: 1;
    transition: max-height 0.4s ease, opacity 0.3s ease, margin 0.4s ease;
  }

  .sub {
    font-size: 0.8rem;
    color: var(--overlay1);
    text-align: center;
    line-height: 1.7;
    margin-top: 0.7rem;
    overflow: hidden;
    max-height: 3rem;
    opacity: 1;
    transition: max-height 0.4s ease, opacity 0.3s ease, margin 0.4s ease;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.8rem, 13vw, 7.5rem);
    line-height: 0.9;
    text-align: center;
    letter-spacing: 0.01em;
    color: var(--text);
    transition: font-size 0.5s cubic-bezier(0.16,1,0.3,1), line-height 0.4s;
  }

  h1 span { color: var(--mauve); }

  /* rolled state */
  .header.rolled {
    flex-direction: column;
    justify-content: center;
    align-items: center;
    margin-bottom: 1.4rem;
    width: 100%;
  }

  .header.rolled .eyebrow {
    max-height: 0; opacity: 0; margin: 0; pointer-events: none;
  }

  .header.rolled .sub {
    max-height: 0; opacity: 0; margin: 0; pointer-events: none;
  }

  .header.rolled h1 {
    font-size: clamp(1.4rem, 4vw, 2rem);
    line-height: 1;
    white-space: nowrap;
    text-align: center;
    width: 100%;
  }

  /* ── CARD ── */
  .card-area {
    width: 100%;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height 0.55s cubic-bezier(0.16,1,0.3,1), opacity 0.4s ease;
  }

  .card-area.revealed {
    max-height: 700px;
    opacity: 1;
  }

  .result-card {
    width: 100%;
    background: var(--mantle);
    border: 1px solid var(--surface1);
    border-radius: 20px;
    padding: 2rem 2.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .result-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--mauve), var(--blue), var(--teal));
    opacity: 0; transition: opacity 0.4s;
  }

  .result-card.has-result { border-color: var(--surface2); }
  .result-card.has-result::before { opacity: 1; }

  .card-label {
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--overlay0);
    margin-bottom: 0.15rem;
  }

  .card-distro {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.4rem, 8vw, 4rem);
    color: var(--mauve);
    line-height: 1;
    min-height: 1em;
  }

  .card-de {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    min-height: 1.6em;
  }

  .de-prefix {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--overlay0);
  }

  .de-pill {
    background: var(--surface0);
    padding: 0.22rem 0.65rem;
    border-radius: 6px;
    font-size: 0.8rem;
    color: var(--blue);
    letter-spacing: 0.03em;
    font-family: 'DM Mono', monospace;
  }

  /* split flavour notes */
  .card-notes {
    margin-top: 0.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .card-note-line {
    display: flex;
    gap: 0.5rem;
    font-size: 0.72rem;
    line-height: 1.5;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.02em;
    word-break: break-word;
    min-height: 1.1em;
  }

  .note-prefix {
    color: var(--overlay0);
    font-size: 0.64rem;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    white-space: nowrap;
    padding-top: 0.06em;
    flex-shrink: 0;
    width: 3.8rem;
  }

  .note-text {
    color: var(--overlay1);
    flex: 1;
  }

  .card-download {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    margin-top: 0.9rem;
    font-size: 0.72rem;
    color: var(--teal);
    text-decoration: none;
    border: 1px solid rgba(148,226,213,0.35);
    border-radius: 8px;
    padding: 0.4rem 0.85rem;
    width: fit-content;
    opacity: 0;
    pointer-events: none;
    transition: background 0.15s, opacity 0.3s, transform 0.15s;
    letter-spacing: 0.04em;
  }

  .card-download.show { opacity: 1; pointer-events: auto; }
  .card-download:hover { background: rgba(148,226,213,0.08); transform: translateX(2px); }

  .shuffle-indicator {
    position: absolute; bottom: 1.1rem; right: 1.4rem;
    display: flex; gap: 4px; align-items: center;
    opacity: 0; transition: opacity 0.3s;
  }

  .shuffle-indicator.spinning { opacity: 1; }

  .dot-spin {
    width: 5px; height: 5px; border-radius: 50%; background: var(--mauve);
    animation: dotBounce 0.6s ease-in-out infinite;
  }
  .dot-spin:nth-child(2) { animation-delay: 0.1s; background: var(--blue); }
  .dot-spin:nth-child(3) { animation-delay: 0.2s; background: var(--teal); }

  @keyframes dotBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  /* ── BUTTONS ── */
  .btn-row {
    margin-top: 1.6rem;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0.8rem;
    opacity: 0;
    animation: fadeUp 0.6s 0.35s forwards;
  }

  .btn-main {
    background: var(--mauve);
    color: var(--crust);
    border: none;
    padding: 0.9rem 2.2rem;
    border-radius: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.25rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
  }

  .btn-main:hover {
    background: var(--lavender);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(203,166,247,0.2);
  }

  .btn-main:active { transform: translateY(0) scale(0.97); }
  .btn-main.rolling { animation: btnPulse 0.15s ease-in-out infinite alternate; }

  @keyframes btnPulse {
    from { transform: scale(1); }
    to   { transform: scale(1.02); }
  }

  .btn-copy {
    background: var(--surface0);
    color: var(--subtext1);
    border: 1px solid var(--surface2);
    padding: 0.9rem 0;
    border-radius: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    width: 0;
    overflow: hidden;
    white-space: nowrap;
    transition: opacity 0.25s, width 0.35s cubic-bezier(0.16,1,0.3,1), padding 0.35s cubic-bezier(0.16,1,0.3,1);
  }

  .btn-copy.show {
    opacity: 1; pointer-events: auto;
    width: auto; padding: 0.9rem 1.4rem;
  }

  .btn-copy:hover { background: var(--surface1); color: var(--text); transform: translateY(-2px); }
  .btn-copy:active { transform: scale(0.97); }

  /* ── HISTORY ── */
  .history { margin-top: 2rem; width: 100%; }

  .history-label {
    font-size: 0.65rem; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--overlay0); margin-bottom: 0.75rem;
  }

  .history-list { display: flex; flex-wrap: wrap; gap: 0.45rem; }

  .history-chip {
    background: var(--surface0); border: 1px solid var(--surface1);
    border-radius: 100px; padding: 0.28rem 0.72rem;
    font-size: 0.68rem; color: var(--subtext0);
    animation: chipIn 0.25s ease-out both;
  }

  @keyframes chipIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }

  .footer-note {
    margin-top: 2.2rem; font-size: 0.65rem; color: var(--overlay0);
    letter-spacing: 0.06em; text-align: center;
    opacity: 0; animation: fadeUp 0.6s 0.8s forwards;
  }

  .license-link {
    margin-top: 0.8rem;
    font-size: 0.6rem;
    color: var(--overlay0);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-decoration: none;
    opacity: 0;
    animation: fadeUp 0.6s 1s forwards;
    transition: color 0.2s;
  }

  .license-link:hover { color: var(--subtext0); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .flash { animation: flashCard 0.35s ease-out; }

  @keyframes flashCard {
    0%   { box-shadow: 0 0 0 0 rgba(203,166,247,0); }
    40%  { box-shadow: 0 0 40px 8px rgba(203,166,247,0.15); }
    100% { box-shadow: 0 0 0 0 rgba(203,166,247,0); }
  }
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="grain"></div>

<div class="wrap">

  <div class="header" id="header">
    <div class="eyebrow">Stop overthinking it</div>
    <h1>JUST PICK<br><span>LINUX</span><br>ALREADY</h1>
    <p class="sub">Let the dice decide your next OS. Commit. Install.</p>
  </div>

  <div class="card-area" id="card-area">
    <div class="result-card" id="card">
      <div class="card-label">Your setup</div>
      <div class="card-distro" id="out-distro"></div>
      <div class="card-de" id="out-de"></div>
      <div class="card-notes">
        <div class="card-note-line">
          <span class="note-prefix">Distro:</span>
          <span class="note-text" id="note-distro"></span>
        </div>
        <div class="card-note-line">
          <span class="note-prefix">Desktop:</span>
          <span class="note-text" id="note-de"></span>
        </div>
      </div>
      <a class="card-download" id="out-download" href="#" target="_blank" rel="noopener noreferrer">
        ↗ Go to official site
      </a>
      <div class="shuffle-indicator" id="spinner">
        <div class="dot-spin"></div>
        <div class="dot-spin"></div>
        <div class="dot-spin"></div>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-main" id="roll-btn" onclick="roll()">Roll the Dice</button>
    <button class="btn-copy" id="copy-btn" onclick="copyResult()">Copy</button>
  </div>

  <div class="history" id="history-wrap" style="display:none">
    <div class="history-label">Previous rolls</div>
    <div class="history-list" id="history-list"></div>
  </div>

  <div class="footer-note">12 distros · 12 desktop environments · 144 possible combos</div>
  <a class="license-link" href="https://github.com/baobot-johnson/just-pick-linux/blob/main/LICENSE" target="_blank" rel="noopener noreferrer">The Unlicense</a>
</div>

<script>
  const distros = [
    ["Ubuntu",             "Solid, stable, massive community. You'll find a fix for everything."],
    ["Fedora",             "Cutting-edge but sane. Red Hat's playground, your daily driver."],
    ["Arch Linux",         "You'll learn Linux or you'll learn patience. Probably both."],
    ["Bazzite",            "Gaming-focused and immutable. Steam out of the box, no babysitting."],
    ["EndeavourOS",        "Arch, but someone held the door open for you."],
    ["CachyOS",            "Arch with performance patches. Benchmarks go brr."],
    ["Zorin OS",           "Familiar layout, zero guilt. Windows refugees welcome."],
    ["Nobara Project",     "Fedora tuned for gaming. Glorious and opinionated."],
    ["openSUSE Tumbleweed","Rolling release, rock solid. The quiet overachiever."],
    ["Debian",             "The grandmother of distros. Unshakeable. Unsexy. Unbeatable."],
    ["Ultramarine Linux",  "Fedora's chill sibling. Flathub on, judgment off."],
    ["Garuda Linux",       "Arch with a sports car paint job and actual tools pre-installed."],
  ];

  const des = [
    ["Default",       "Whatever ships with it. Embrace the vision."],
    ["KDE Plasma",    "Infinitely tweakable. A tinkerer's paradise."],
    ["GNOME",         "Opinionated and smooth. Touch-friendly, keyboard-friendly."],
    ["XFCE",          "Lightweight classic. Still blazing fast in 2025."],
    ["COSMIC",        "System76's new kid. Rust-powered, future-forward."],
    ["Cinnamon",      "Traditional desktop done right. Mint's finest export."],
    ["Hyprland",      "Wayland tiling beauty. Your screenshots will be envied."],
    ["MATE",          "GNOME 2 lives on. Clean, fast, no drama."],
    ["Budgie",        "Polished panel-based DE. Simple never looked this good."],
    ["LXQt",          "Qt-based and featherweight. Netbook-era hardware rejoices."],
    ["Sway",          "i3 but Wayland. Keyboard-driven productivity beast."],
    ["i3wm",          "Minimal tiling WM. You'll write a blog post about it."],
    ["Enlightenment", "Eye candy from 2000 that still turns heads. Wildly unique."],
  ];

  const distroUrls = {
    "Ubuntu":              "https://ubuntu.com",
    "Fedora":              "https://fedoraproject.org",
    "Arch Linux":          "https://archlinux.org",
    "Bazzite":             "https://bazzite.gg",
    "EndeavourOS":         "https://endeavouros.com",
    "CachyOS":             "https://cachyos.org",
    "Zorin OS":            "https://zorin.com/os",
    "Nobara Project":      "https://nobaraproject.org",
    "openSUSE Tumbleweed": "https://www.opensuse.org",
    "Debian":              "https://www.debian.org",
    "Ultramarine Linux":   "https://ultramarine-linux.org",
    "Garuda Linux":        "https://garudalinux.org",
  };

  let current = null;
  let history = [];
  let rolling = false;

  const H1_DEFAULT  = 'JUST PICK<br><span>LINUX</span><br>ALREADY';
  const H1_COLLAPSED = 'JUST PICK <span>LINUX</span> ALREADY';

  function pickDistro() { return distros[Math.floor(Math.random() * distros.length)]; }

  function pickDE() {
    if (Math.random() < 0.01) return des[des.length - 1];
    const pool = des.slice(0, des.length - 1);
    return pool[Math.floor(Math.random() * pool.length)];
  }

  const chars = 'abcdefghijklmnopqrstuvwxyz.,!?-_/\\|#@%&*';
  function randChar() { return chars[Math.floor(Math.random() * chars.length)]; }

  function scrambleSettle(el, finalText) {
    const len = finalText.length;
    let frame = 0;
    const totalFrames = 18;
    const resolveAt = Array.from({length: len}, (_, i) =>
      Math.floor((i / len) * totalFrames * 0.7) + Math.floor(Math.random() * 4)
    );
    const iv = setInterval(() => {
      let display = '';
      for (let i = 0; i < len; i++) {
        if (finalText[i] === ' ') { display += ' '; continue; }
        display += frame >= resolveAt[i] ? finalText[i] : randChar();
      }
      el.textContent = display;
      frame++;
      if (frame > totalFrames) { el.textContent = finalText; clearInterval(iv); }
    }, 40);
  }

  function applyResult(finalDistro, finalDE) {
    current = { distro: finalDistro[0], de: finalDE[0], distroNote: finalDistro[1], deNote: finalDE[1] };

    document.getElementById('out-distro').textContent = finalDistro[0];
    document.getElementById('out-de').innerHTML =
      `<span class="de-prefix">+</span><span class="de-pill">${finalDE[0]}</span>`;

    const noteDistroEl = document.getElementById('note-distro');
    const noteDEEl     = document.getElementById('note-de');

    noteDistroEl.textContent = Array.from({length: finalDistro[1].length}, (_, i) =>
      finalDistro[1][i] === ' ' ? ' ' : randChar()).join('');
    scrambleSettle(noteDistroEl, finalDistro[1]);

    noteDEEl.textContent = Array.from({length: finalDE[1].length}, (_, i) =>
      finalDE[1][i] === ' ' ? ' ' : randChar()).join('');
    scrambleSettle(noteDEEl, finalDE[1]);

    const card = document.getElementById('card');
    card.classList.add('has-result', 'flash');
    setTimeout(() => card.classList.remove('flash'), 400);

    document.getElementById('copy-btn').classList.add('show');
    const dl = document.getElementById('out-download');
    dl.href = distroUrls[finalDistro[0]] || '#';
    dl.classList.add('show');
  }

  function roll() {
    if (rolling) return;
    rolling = true;

    // Collapse header — swap to single-line h1 for true centering
    const header = document.getElementById('header');
    document.querySelector('h1').innerHTML = H1_COLLAPSED;
    header.classList.add('rolled');
    document.getElementById('card-area').classList.add('revealed');
    document.getElementById('out-download').classList.remove('show');

    const btn     = document.getElementById('roll-btn');
    const spinner = document.getElementById('spinner');
    btn.classList.add('rolling');
    btn.textContent = 'Deciding...';
    spinner.classList.add('spinning');

    const distroEl     = document.getElementById('out-distro');
    const deEl         = document.getElementById('out-de');
    const noteDistroEl = document.getElementById('note-distro');
    const noteDEEl     = document.getElementById('note-de');

    let ticks = 0;
    const maxTicks = 14;
    const interval = setInterval(() => {
      distroEl.textContent = pickDistro()[0];
      deEl.innerHTML = `<span class="de-prefix">+</span><span class="de-pill">${pickDE()[0]}</span>`;
      noteDistroEl.textContent = Array.from({length: 52}, () => Math.random() < 0.12 ? ' ' : randChar()).join('');
      noteDEEl.textContent     = Array.from({length: 46}, () => Math.random() < 0.12 ? ' ' : randChar()).join('');
      ticks++;
      if (ticks >= maxTicks) {
        clearInterval(interval);
        applyResult(pickDistro(), pickDE());
        addHistory(current.distro, current.de);
        spinner.classList.remove('spinning');
        btn.classList.remove('rolling');
        btn.textContent = 'Roll Again';
        rolling = false;
      }
    }, 60);
  }

  function addHistory(distro, de) {
    history.unshift(`${distro} + ${de}`);
    if (history.length > 7) history.pop();
    try { localStorage.setItem('jpla_history', JSON.stringify(history)); } catch(e) {}
    renderHistory();
  }

  function renderHistory() {
    if (!history.length) return;
    const wrap = document.getElementById('history-wrap');
    const list = document.getElementById('history-list');
    wrap.style.display = 'block';
    list.innerHTML = '';
    history.forEach(item => {
      const chip = document.createElement('div');
      chip.className = 'history-chip';
      chip.textContent = item;
      list.appendChild(chip);
    });
  }

  function copyResult() {
    if (!current) return;
    const text = `${current.distro} + ${current.de}`;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 1500);
    });
  }

  // On load: restore history from localStorage, stay on pre-roll screen
  try {
    const saved = localStorage.getItem('jpla_history');
    if (saved) { history = JSON.parse(saved); renderHistory(); }
  } catch(e) {}
</script>
</body>
</html>
